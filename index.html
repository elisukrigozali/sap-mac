<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Agenda & Absensi MTs Al-Hidayah Cibentang</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen flex flex-col font-sans">

    <section id="auth-screen" class="flex flex-grow items-center justify-center p-4 min-h-screen bg-gradient-to-br from-emerald-900 via-emerald-800 to-teal-950 no-print">
        <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full overflow-hidden border border-emerald-700/20">
            <div class="bg-emerald-800 p-6 text-center text-white">
                <h2 class="text-xl font-bold tracking-wide">MTs Al-Hidayah Cibentang</h2>
                <p class="text-xs text-emerald-200 mt-1">Sistem Agenda & Absensi Online</p>
            </div>
            <div class="p-8 flex flex-col gap-4">
                <div id="login-alert-error" class="hidden bg-red-50 border border-red-200 text-red-600 text-xs px-3 py-2.5 rounded-lg flex items-center gap-2">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <span id="error-msg">Username atau password salah!</span>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Username / Nama Guru</label>
                    <select id="login-username" class="w-full bg-slate-50 border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                        <option value="">-- Pilih Nama Anda --</option>
                        <option value="sukri">E. Sukri Gozali, S.Pd.</option>
                        <option value="nurwati">Nurwati, S.Ag.</option>
                        <option value="fauzi">Ahmad Fauzi, S.Pd.I.</option>
                        <option value="maryam">Siti Maryam, S.Pd.</option>
                        <option value="maimun">Drs. H. Maimun</option>
                        <option value="rina">Rina Herlina, S.Pd.</option>
                        <option value="dadang">Dadang Solihin, S.Ag.</option>
                        <option value="yayan">Yayan Mulyana, S.Pd.</option>
                        <option value="iis">Iis Aisyah, S.Pd.</option>
                        <option value="ade">Ade Hany Melawati, S.Pd.</option>
                        <option value="admin">Administrator (Tata Usaha)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Password PIN (Default: 1234)</label>
                    <input type="password" id="login-password" placeholder="••••" class="w-full bg-slate-50 border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                </div>
                <button id="btn-submit-login" type="button" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold text-sm py-2.5 rounded-lg shadow-md transition-all cursor-pointer">
                    Masuk Sekarang
                </button>
            </div>
        </div>
    </section>

    <div id="main-dashboard-app" class="hidden flex-col flex-grow">
        <header class="bg-emerald-800 text-white shadow-md no-print">
            <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                <div>
                    <h1 class="text-xl font-bold tracking-wide">MTs Al-Hidayah Cibentang</h1>
                    <p class="text-xs text-emerald-200">Sistem Administrasi Agenda & Absensi Online (Realtime)</p>
                </div>
                <div class="flex flex-col items-center md:items-end gap-2">
                    <div class="bg-emerald-950/50 px-4 py-1.5 rounded-lg font-mono text-sm font-bold text-emerald-100">
                        <span id="current-time-gmt7">00:00:00 WIB</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] bg-emerald-900 px-3 py-1 rounded-full text-white">
                            Masuk sebagai: <strong id="current-user-fullname">-</strong>
                        </span>
                        <button id="btn-logout" class="bg-red-700 hover:bg-red-800 text-white text-[10px] px-3 py-1 rounded-full font-bold">Keluar</button>
                    </div>
                </div>
            </div>
        </header>

        <main class="flex-grow max-w-7xl w-full mx-auto p-4 md:py-6 grid grid-cols-1 lg:grid-cols-12 gap-6 no-print">
            <section class="lg:col-span-5 bg-white rounded-xl shadow-md p-5 flex flex-col gap-5">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Pilih Tanggal</label>
                        <input type="date" id="input-date" class="w-full bg-slate-50 border border-slate-300 rounded-lg px-3 py-2 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Pilih Kelas</label>
                        <select id="select-class" class="w-full bg-slate-50 border border-slate-300 rounded-lg px-3 py-2 text-sm">
                            <option value="7">Kelas 7</option>
                            <option value="8">Kelas 8</option>
                            <option value="9A">Kelas 9A</option>
                            <option value="9B">Kelas 9B</option>
                            <option value="9C">Kelas 9C</option>
                        </select>
                    </div>
                </div>

                <div class="bg-emerald-50/50 rounded-xl p-4 border border-emerald-100 flex flex-col gap-4">
                    <h3 class="text-xs font-bold uppercase text-emerald-800"><i class="fa-solid fa-pen-nib"></i> Input Agenda</h3>
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Nama Guru</label>
                        <input type="text" id="agenda-guru" readonly value="-" class="w-full bg-slate-100 border rounded-lg px-3 py-2 text-sm font-semibold">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Mata Pelajaran</label>
                        <select id="agenda-mapel" class="w-full bg-white border border-slate-300 rounded-lg px-3 py-2 text-sm"></select>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs font-semibold text-slate-600 mb-1">Dari Jam</label>
                            <select id="agenda-jam-mulai" class="w-full bg-white border border-slate-300 rounded-lg px-3 py-2 text-sm"></select>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-600 mb-1">Sampai Jam</label>
                            <select id="agenda-jam-selesai" class="w-full bg-white border border-slate-300 rounded-lg px-3 py-2 text-sm"></select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Uraian Pembelajaran *</label>
                        <textarea id="agenda-kegiatan" rows="2" class="w-full bg-white border border-slate-300 rounded-lg px-3 py-2 text-sm"></textarea>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Catatan</label>
                        <input id="agenda-keterangan" type="text" class="w-full bg-white border border-slate-300 rounded-lg px-3 py-2 text-sm">
                    </div>
                    <button id="btn-save-agenda" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium text-sm py-2 rounded-lg">
                        Simpan ke Tabel Agenda
                    </button>
                </div>
            </section>

            <section class="lg:col-span-7 flex flex-col gap-6">
                <div class="bg-white rounded-xl shadow-md p-5 flex flex-col gap-4">
                    <div class="flex justify-between border-b pb-2 items-center">
                        <h2 class="text-base font-bold text-slate-800">Preview Agenda Hari Ini</h2>
                        <div class="flex gap-2 text-xs font-bold">
                            <span class="bg-emerald-100 text-emerald-800 px-2 py-1 rounded" id="ind-kelas">Kelas: 7</span>
                            <span class="bg-blue-100 text-blue-800 px-2 py-1 rounded" id="ind-tanggal">-</span>
                        </div>
                    </div>
                    <div class="overflow-x-auto border rounded-lg">
                        <table class="w-full text-xs">
                            <thead class="bg-slate-50 border-b">
                                <tr>
                                    <th class="p-2 border-r text-center w-12">Jam</th>
                                    <th class="p-2 border-r">Guru</th>
                                    <th class="p-2 border-r">Mapel</th>
                                    <th class="p-2 border-r">Kegiatan</th>
                                    <th class="p-2 text-center w-24">Status</th>
                                </tr>
                            </thead>
                            <tbody id="table-agenda-rows"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // Mengamankan inisialisasi agar tombol login tidak macet walau internet lambat
        let supabase;
        try {
            const SUPABASE_URL = 'https://pijtqyrglrnkjfqkehix.supabase.co'; 
            const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpanRxeXJnbHJua2pmcWtlaGl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MzU0ODYsImV4cCI6MjA5OTAxMTQ4Nn0.C4Z81j7KRc9HyjNzbpjk3vvN57bmI2sbeu3N1HJTxY8';      
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch (e) {
            console.error("Supabase gagal memuat di awal, aman untuk login lokal:", e);
        }

        const DEFAULT_MAPEL = [
            "Al-Qur'an Hadits", "Akidah Akhlak", "Fikih", "Sejarah Kebudayaan Islam (SKI)",
            "Pendidikan Pancasila (PPKn)", "Bahasa Indonesia", "Bahasa Arab", "Matematika",
            "Ilmu Pengetahuan Alam (IPA)", "Ilmu Pengetahuan Sosial (IPS)", "Bahasa Inggris"
        ];

        let state = { agendas: [], namaLengkapGuru: "" };

        // Aksi Login Fleksibel & Anti-Macet
        document.getElementById('btn-submit-login').addEventListener('click', () => {
            const userSelect = document.getElementById('login-username');
            const passInput = document.getElementById('login-password').value.trim();
            const selectedText = userSelect.options[userSelect.selectedIndex].text;
            const selectedValue = userSelect.value;

            if (!selectedValue) {
                tampilkanError("Silakan pilih nama Anda terlebih dahulu!");
                return;
            }

            // PIN Default disetel ke '1234' untuk semua guru demi kenyamanan
            if (passInput === '1234' || (selectedValue === 'admin' && passInput === 'admin123')) {
                state.namaLengkapGuru = selectedText;
                
                // Pindah Layar
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-dashboard-app').classList.remove('hidden');
                
                // Pasang Nama di Form Input
                document.getElementById('current-user-fullname').textContent = state.namaLengkapGuru;
                document.getElementById('agenda-guru').value = state.namaLengkapGuru;
                
                // Hubungkan ke Cloud Data
                aktifkanFiturCloud();
            } else {
                tampilkanError("Password PIN yang Anda masukkan salah!");
            }
        });

        function tampilkanError(pesan) {
            const errBox = document.getElementById('login-alert-error');
            document.getElementById('error-msg').textContent = pesan;
            errBox.classList.remove('hidden');
            setTimeout(() => errBox.classList.add('hidden'), 3500);
        }

        function aktifkanFiturCloud() {
            muatDataAgendaDariCloud();
            if (supabase) {
                supabase
                  .channel('schema-db-changes')
                  .on('postgres_changes', { event: '*', schema: 'public', table: 'agenda' }, () => {
                      muatDataAgendaDariCloud();
                  })
                  .subscribe();
            }
        }

        async function muatDataAgendaDariCloud() {
            if (!supabase) return renderAgendaTable();
            try {
                const { data: agenda, error } = await supabase
                    .from('agenda')
                    .select('*')
                    .order('tanggal', { ascending: false });

                if (agenda) {
                    state.agendas = agenda.map(a => ({
                        date: a.tanggal,
                        classId: a.kelas,
                        jamMulai: a.jam_mulai,
                        jamSelesai: a.jam_selesai,
                        guru: a.guru,
                        mapel: a.mapel,
                        kegiatan: a.kegiatan,
                        keterangan: a.keterangan
                    }));
                }
            } catch (err) {
                console.error(err);
            }
            renderAgendaTable();
        }

        async function simpanAgendaKeCloud(dataAgenda) {
            if (!supabase) return alert("Aplikasi berjalan offline. Gagal terhubung ke cloud.");
            const { error } = await supabase
                .from('agenda')
                .insert([{
                    tanggal: dataAgenda.date,
                    kelas: dataAgenda.classId,
                    jam_mulai: dataAgenda.jamMulai,
                    jam_selesai: dataAgenda.jamSelesai,
                    guru: dataAgenda.guru,
                    mapel: dataAgenda.mapel,
                    kegiatan: dataAgenda.kegiatan,
                    keterangan: dataAgenda.keterangan
                }]);

            if (error) {
                alert('Gagal menyimpan: ' + error.message);
            } else {
                muatDataAgendaDariCloud();
            }
        }

        function renderAgendaTable() {
            const dateVal = document.getElementById('input-date').value;
            const classVal = document.getElementById('select-class').value;
            const tbodyWeb = document.getElementById('table-agenda-rows');
            
            if(!tbodyWeb) return;
            tbodyWeb.innerHTML = "";
            
            const dailyAgendas = state.agendas.filter(a => a.date === dateVal && a.classId === classVal);

            for (let jam = 1; jam <= 10; jam++) {
                const agenda = dailyAgendas.find(a => jam >= parseInt(a.jamMulai) && jam <= parseInt(a.jamSelesai));
                const tr = document.createElement('tr');
                tr.className = "border-b hover:bg-slate-50";

                if (agenda) {
                    tr.innerHTML = `
                        <td class="p-2 border-r text-center font-bold bg-slate-50">${jam}</td>
                        <td class="p-2 border-r font-semibold">${agenda.guru}</td>
                        <td class="p-2 border-r text-emerald-800">${agenda.mapel}</td>
                        <td class="p-2 border-r text-slate-600">${agenda.kegiatan}</td>
                        <td class="p-2 text-center text-emerald-600 font-semibold"><i class="fa-solid fa-cloud"></i> Cloud</td>
                    `;
                } else {
                    tr.innerHTML = `
                        <td class="p-2 border-r text-center font-bold bg-slate-50 text-slate-400">${jam}</td>
                        <td class="p-2 text-center text-slate-400 italic" colspan="3">Belum diisi / Kosong</td>
                        <td class="p-2 text-center text-slate-300">-</td>
                    `;
                }
                tbodyWeb.appendChild(tr);
            }
        }

        setInterval(() => {
            const options = { timeZone: 'Asia/Jakarta', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            document.getElementById('current-time-gmt7').textContent = new Intl.DateTimeFormat('id-ID', options).format(new Date()) + " WIB";
        }, 1000);

        window.addEventListener('DOMContentLoaded', () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('input-date').value = today;
            document.getElementById('ind-tanggal').textContent = today;

            const agendaMapel = document.getElementById('agenda-mapel');
            DEFAULT_MAPEL.forEach(m => agendaMapel.add(new Option(m, m)));

            const jamMulai = document.getElementById('agenda-jam-mulai');
            const jamSelesai = document.getElementById('agenda-jam-selesai');
            for(let i=1; i<=10; i++){
                jamMulai.add(new Option(i, i));
                jamSelesai.add(new Option(i, i));
            }
        });

        document.getElementById('btn-save-agenda').addEventListener('click', () => {
            const kegiatanVal = document.getElementById('agenda-kegiatan').value.trim();
            if (!kegiatanVal) return alert("Uraian kegiatan wajib diisi!");

            const agendaBaru = {
                date: document.getElementById('input-date').value,
                classId: document.getElementById('select-class').value,
                jamMulai: document.getElementById('agenda-jam-mulai').value,
                jamSelesai: document.getElementById('agenda-jam-selesai').value,
                guru: state.namaLengkapGuru,
                mapel: document.getElementById('agenda-mapel').value,
                kegiatan: kegiatanVal,
                keterangan: document.getElementById('agenda-keterangan').value.trim()
            };

            simpanAgendaKeCloud(agendaBaru);
            document.getElementById('agenda-kegiatan').value = "";
            document.getElementById('agenda-keterangan').value = "";
        });

        document.getElementById('input-date').addEventListener('change', (e) => {
            document.getElementById('ind-tanggal').textContent = e.target.value;
            renderAgendaTable();
        });
        document.getElementById('select-class').addEventListener('change', (e) => {
            document.getElementById('ind-kelas').textContent = "Kelas: " + e.target.value;
            renderAgendaTable();
        });
        document.getElementById('btn-logout').addEventListener('click', () => {
            location.reload();
        });
    </script>
</body>
</html>
